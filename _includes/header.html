<header class="site-header">
  <div class="site-header-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      {% if page.url == '/' %}
      <img src="{{ '/logo.svg' | relative_url }}" alt="Roll Ready PT logo" class="brand-mark">
      {% else %}
      <div id="rr-logo-animation" class="brand-mark" role="img" aria-label="Roll Ready PT logo animation"></div>
      {% endif %}
      <span class="brand-name">Roll Ready <span>PT</span></span>
    </a>
    <nav class="nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/about.html' | relative_url }}"{% if page.url == '/about.html' %} class="active"{% endif %}>About Me</a>
      <a href="{{ '/what-is-physical-therapy.html' | relative_url }}"{% if page.url == '/what-is-physical-therapy.html' %} class="active"{% endif %}>What Is PT?</a>
      <a href="{{ '/traditional-vs-cash-pt.html' | relative_url }}"{% if page.url == '/traditional-vs-cash-pt.html' %} class="active"{% endif %}>Insurance vs Cash PT</a>
      <a href="{{ '/contact.html' | relative_url }}"{% if page.url == '/contact.html' %} class="active"{% endif %}>Contact</a>
      <a href="{{ '/book.html' | relative_url }}" class="nav-cta{% if page.url == '/book.html' %} active{% endif %}">Book Now</a>
    </nav>
  </div>
</header>
